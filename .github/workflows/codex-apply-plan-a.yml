name: Codex Apply Plan A

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  apply-plan-a:
    if: ${{ github.actor != 'github-actions[bot]' && contains(github.event.head_commit.message, '[codex-apply-plan-a]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - name: Apply verified patch
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/plan-a.patch.b64 <<'PATCH_B64'

PATCH_B64
          base64 -d /tmp/plan-a.patch.b64 > /tmp/plan-a.patch
          git apply --check /tmp/plan-a.patch
          git apply /tmp/plan-a.patch
          rm -f .github/workflows/codex-apply-plan-a.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/market_analyzer.py tests/test_market_analyzer_plain_language.py .github/workflows/codex-apply-plan-a.yml
          git commit -m "Improve plain-language market review copy"
          git push origin "HEAD:${{ github.ref_name }}"
